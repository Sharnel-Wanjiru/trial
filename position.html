<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tourist</title>
	<style>
		*{
			padding: 0px;
			margin: 0px;
		}
		.logo{
			height: 40px;
			width: 40px;
		}
		.bg{
			position: relative;
			background-image: url(Masaai-Mara.jpg);
			height: 100vh;
			width: 100%;
			background-size: cover;
			background-position: center;
		}
		.overlay{
			position: absolute;
			height: 100vh;
			width: 100%;
			background: rgba(0, 0, 0, 0.7);
		}
		.text{
			display: flex;
			align-items: center;
			gap: 20px;
		}
		.details{
			display: flex;
			align-items: center;
			justify-content: center;
			height: 80vh;
			z-index: 10px;
		}
		.txt{
			justify-content: center;
			display: flex;
			gap: 20px;
		}
		p{
			color: white;
		}
		h1{
			color: white;
		}
		.bo{
			margin-top: 20px;
			background-color:orange ;
		text color: whitesmoke;
		padding:03%;
		border-radius:20px;
		border:none;
		}
		.bt{
			margin-top: 20px;
			background-color:whitesmoke ;
			text color: black;
			padding:03%;
			border: none;
			border-radius:20px;
		}
	</style>
	</head>
<body>
	<section class="bg">
		<div class="overlay">
			<div class="text">
	<img class="logo" src="Masaai.jpeg" alt="image here">
	<p>masaai mara</p>
</div>
	<div class="details">
		<div>
		<h1>Discover Kenya's Hidden Wonders</h1>
		<p style="margin-top: 10px;">Experience breathtaking safaris, rich culture, and unforgettable adventures</p>
		<div class="txt">
		<button class="bo">Explore Tours</button>
		<button class="bt">Plan your trip</button>
	</div>
	</div>
	</div>
</div>
</section>

</body>
</html>
